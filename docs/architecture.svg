<svg viewBox="0 0 940 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d" font-family="ui-sans-serif, system-ui, sans-serif">
  <title id="t">LifeController system architecture</title>
  <desc id="d">The browser talks to a Next.js server (Auth.js, middleware approval gate, API routes), which uses Claude and Voyage for AI, PostgreSQL with pgvector plus local disk for storage, and reaches out to Google OAuth for sign-in and the web for documentation.</desc>
  <style>
    :root{
      --txt:#1f2430; --txt2:#5b6472; --bg:#ffffff; --bd:#d4d8e0;
      --brand:#7c3aed; --brandbg:#7c3aed14; --surface:#7f7f7f0f;
    }
    @media (prefers-color-scheme: dark){
      :root{
        --txt:#e8eaf0; --txt2:#9aa3b2; --bg:#1b1f2a; --bd:#333a48;
        --brand:#a78bfa; --brandbg:#a78bfa1f; --surface:#ffffff0a;
      }
    }
    .lbl{fill:var(--txt);font-weight:600;font-size:13px}
    .sub{fill:var(--txt2);font-size:10.5px}
    .ttl{fill:var(--txt2);font-weight:700;font-size:11px;letter-spacing:.06em;text-transform:uppercase}
    .hd{fill:var(--txt);font-weight:700;font-size:15px}
    .elbl{fill:var(--txt2);font-size:10px;font-weight:600}
    .box{fill:var(--bg);stroke:var(--bd);stroke-width:1.4}
    .pill{fill:var(--bg);stroke:var(--brand);stroke-width:1.4}
    .group-brand{fill:var(--brandbg);stroke:var(--brand);stroke-width:1.3}
    .group-data{fill:var(--surface);stroke:var(--bd);stroke-width:1.3}
    .ext{fill:none;stroke:var(--brand);stroke-width:1.4;stroke-dasharray:5 4}
    .edge{stroke:var(--bd);stroke-width:1.6;fill:none}
    .edge-b{stroke:var(--brand);stroke-width:1.6;fill:none}
  </style>
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 Z" fill="var(--bd)"/></marker>
    <marker id="ahb" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 Z" fill="var(--brand)"/></marker>
  </defs>

  <text x="40" y="30" class="hd">LifeController · system architecture</text>

  <!-- External services (dashed) -->
  <rect class="ext" x="250" y="44" width="240" height="54" rx="10"/>
  <text x="260" y="70" class="lbl">Google OAuth</text>
  <text x="260" y="86" class="sub">federated sign-in</text>

  <rect class="ext" x="600" y="44" width="300" height="54" rx="10"/>
  <text x="616" y="70" class="lbl">Web sources</text>
  <text x="616" y="86" class="sub">manuals · official docs</text>

  <!-- Browser -->
  <rect class="box" x="40" y="257" width="150" height="86" rx="12"/>
  <text x="115" y="296" text-anchor="middle" class="lbl">Browser</text>
  <text x="115" y="313" text-anchor="middle" class="sub">shadcn/ui · dark mode</text>

  <!-- Next.js server container -->
  <rect class="group-brand" x="250" y="150" width="240" height="300" rx="14"/>
  <text x="270" y="178" class="ttl">Next.js · App Router</text>
  <rect class="pill" x="270" y="196" width="200" height="54" rx="10"/>
  <text x="370" y="220" text-anchor="middle" class="lbl">Auth.js</text>
  <text x="370" y="237" text-anchor="middle" class="sub">Google login + JWT</text>
  <rect class="pill" x="270" y="264" width="200" height="54" rx="10"/>
  <text x="370" y="288" text-anchor="middle" class="lbl">Middleware</text>
  <text x="370" y="305" text-anchor="middle" class="sub">admin approval gate</text>
  <rect class="pill" x="270" y="332" width="200" height="54" rx="10"/>
  <text x="370" y="356" text-anchor="middle" class="lbl">API routes</text>
  <text x="370" y="373" text-anchor="middle" class="sub">items · upload · search</text>

  <!-- AI layer -->
  <rect class="group-brand" x="600" y="130" width="300" height="140" rx="14"/>
  <text x="618" y="156" class="ttl">AI layer</text>
  <rect class="box" x="618" y="166" width="264" height="44" rx="9"/>
  <text x="632" y="186" class="lbl">Claude · Opus 4.8</text>
  <text x="632" y="201" class="sub">answers · web_search</text>
  <rect class="box" x="618" y="216" width="264" height="44" rx="9"/>
  <text x="632" y="236" class="lbl">Voyage</text>
  <text x="632" y="251" class="sub">embeddings → pgvector</text>

  <!-- Storage -->
  <rect class="group-data" x="600" y="310" width="300" height="140" rx="14"/>
  <text x="618" y="336" class="ttl">Storage</text>
  <rect class="box" x="618" y="346" width="264" height="44" rx="9"/>
  <text x="632" y="366" class="lbl">PostgreSQL + pgvector</text>
  <text x="632" y="381" class="sub">items · files · notes · users</text>
  <rect class="box" x="618" y="396" width="264" height="44" rx="9"/>
  <text x="632" y="416" class="lbl">Local disk</text>
  <text x="632" y="431" class="sub">uploads · receipts · images</text>

  <!-- Edges -->
  <!-- Browser <-> server -->
  <path class="edge-b" d="M190,300 H246" marker-end="url(#ahb)"/>
  <text x="218" y="293" text-anchor="middle" class="elbl">HTTPS</text>
  <!-- Auth.js -> Google OAuth -->
  <path class="edge-b" d="M440,196 V100" marker-end="url(#ahb)"/>
  <text x="448" y="150" class="elbl">OAuth 2.0</text>
  <!-- API routes -> AI -->
  <path class="edge-b" d="M470,345 C540,330 540,205 596,200" marker-end="url(#ahb)"/>
  <text x="512" y="262" class="elbl">embed · ask</text>
  <!-- API routes -> Storage -->
  <path class="edge" d="M470,372 C535,378 540,380 596,380" marker-end="url(#ah)"/>
  <text x="512" y="372" text-anchor="middle" class="elbl">Drizzle ORM</text>
  <!-- Claude -> Web sources -->
  <path class="edge-b" d="M765,166 V100" marker-end="url(#ahb)"/>
  <text x="773" y="135" class="elbl">web_search</text>
  <!-- Voyage -> Postgres (store vectors) -->
  <path class="edge" d="M735,260 V346" marker-end="url(#ah)"/>
  <text x="743" y="306" class="elbl">vectors</text>

  <!-- Legend -->
  <rect x="40" y="500" width="14" height="14" rx="3" class="group-brand"/>
  <text x="62" y="511" class="sub">Your app &amp; AI</text>
  <rect x="190" y="500" width="14" height="14" rx="3" class="group-data"/>
  <text x="212" y="511" class="sub">Data stores</text>
  <rect x="320" y="500" width="14" height="14" rx="3" class="ext"/>
  <text x="342" y="511" class="sub">Third-party services</text>
</svg>
